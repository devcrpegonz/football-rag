services:
  app:
    image: php:8.3-cli
    working_dir: /var/www/html
    volumes:
      - ../app:/var/www/html
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: football_rag
      POSTGRES_USER: football
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
